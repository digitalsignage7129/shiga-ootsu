<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBGT Monitor - Otsu Oishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #00ffcc;
            --danger-color: #ff0055;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: background 1s ease;
        }

        /* 危険度別背景エフェクト */
        .level-danger { background: radial-gradient(circle, #440000 0%, #0a0a0a 100%); --accent-color: #ff0055; }
        .level-warning { background: radial-gradient(circle, #443300 0%, #0a0a0a 100%); --accent-color: #ffcc00; }
        .level-safe { background: radial-gradient(circle, #002244 0%, #0a0a0a 100%); --accent-color: #00ffcc; }

        .container {
            text-align: center;
            width: 90%;
            border: 2px solid var(--accent-color);
            padding: 40px;
            box-shadow: 0 0 30px var(--accent-color);
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.7);
        }

        .location {
            font-size: 2rem;
            letter-spacing: 0.2rem;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        .wbgt-label {
            font-size: 1.5rem;
            opacity: 0.8;
        }

        .wbgt-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 12rem;
            line-height: 1;
            margin: 20px 0;
            text-shadow: 0 0 50px var(--accent-color);
        }

        .wbgt-unit { font-size: 4rem; }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 30px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label { font-size: 1.2rem; color: var(--accent-color); }
        .info-data { font-size: 2.5rem; font-family: 'Orbitron', sans-serif; }

        #update-time {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            opacity: 0.5;
        }

        /* 鼓動するアニメーション */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .pulse { animation: pulse 2s infinite ease-in-out; }
    </style>
</head>
<body id="body" class="level-safe">

<div class="container pulse">
    <div class="location">OTSU OISHI-NAKA</div>
    <div class="wbgt-label">WBGT INDEX</div>
    <div class="wbgt-value" id="wbgt">--.-<span class="wbgt-unit">℃</span></div>
    
    <div class="weather-grid">
        <div class="info-item">
            <span class="info-label">TEMP</span>
            <span class="info-data" id="temp">--.-℃</span>
        </div>
        <div class="info-item">
            <span class="info-label">WEATHER</span>
            <span class="info-data" id="weather">---</span>
        </div>
        <div class="info-item">
            <span class="info-label">WIND</span>
            <span class="info-data" id="wind">-- m/s</span>
        </div>
    </div>
</div>

<div id="update-time">SYNCING...</div>

<script>
    async function updateDisplay() {
        try {
            // キャッシュを避けるためにタイムスタンプを付与
            const response = await fetch('data.json?' + new Date().getTime());
            const data = await response.json();

            // データの反映
            document.getElementById('wbgt').innerHTML = `${data.wbgt}<span class="wbgt-unit">℃</span>`;
            document.getElementById('temp').innerText = `${data.temp}℃`;
            document.getElementById('weather').innerText = data.weather;
            document.getElementById('wind').innerText = `${data.wind_dir} ${data.wind_speed}m/s`;
            document.getElementById('update-time').innerText = `LAST SYNC: ${data.updated}`;

            // 背景色の切り替え
            const body = document.getElementById('body');
            const val = parseFloat(data.wbgt);
            body.className = ''; // クラスリセット
            if (val >= 31) body.classList.add('level-danger');
            else if (val >= 28) body.classList.add('level-warning');
            else body.classList.add('level-safe');

        } catch (e) {
            console.error("Data fetch error", e);
        }
    }

    // 1分ごとにデータを読み込み直し
    setInterval(updateDisplay, 60000);
    updateDisplay();
</script>

</body>
</html>

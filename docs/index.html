<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WBGT SIGNAGE - OISHI</title>
    <style>
        /* 画面全体の配置設定 */
        body {
            margin: 0;
            padding: 0;
            background-color: #333; /* 背景はグレー */
            display: flex;
            justify-content: center; /* 左右中央 */
            align-items: center;     /* 上下中央 */
            height: 100vh;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        /* 690x728のサイネージ本体 */
        .signage-canvas {
            width: 690px;
            height: 728px;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            border: 4px solid #444;
            box-sizing: border-box;
            position: relative;
        }

        /* 状態に応じた色変化 */
        .status-danger { --accent: #ff0000; }
        .status-warning { --accent: #ffaa00; }
        .status-safe { --accent: #00ccff; }

        .header {
            background-color: var(--accent);
            color: #000;
            font-size: 36px;
            font-weight: bold;
            padding: 15px;
            text-align: center;
        }

        .main-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .wbgt-label { font-size: 40px; color: #888; }
        .wbgt-value { font-size: 240px; font-weight: 900; line-height: 1; }
        .wbgt-unit { font-size: 80px; }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: #111;
            padding: 20px;
            gap: 20px;
        }

        .info-item {
            border-left: 8px solid var(--accent);
            padding-left: 15px;
        }

        .label { font-size: 24px; color: #888; display: block; }
        .value { font-size: 48px; font-weight: bold; }

        .footer {
            padding: 10px 20px;
            font-size: 20px;
            color: #666;
            text-align: right;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body id="status-body" class="status-safe">

<div class="signage-canvas">
    <div class="header" id="header-text">大石中付近：計測中</div>
    
    <div class="main-display">
        <div class="wbgt-label">暑さ指数 (WBGT)</div>
        <div class="wbgt-value" id="wbgt-val">--<span class="wbgt-unit">℃</span></div>
    </div>

    <div class="info-grid">
        <div class="info-item">
            <span class="label">気温</span>
            <span class="value" id="temp-val">--.-℃</span>
        </div>
        <div class="info-item">
            <span class="label">天気</span>
            <span class="value" id="weather-val">--</span>
        </div>
        <div class="info-item">
            <span class="label">風向</span>
            <span class="value" id="wind-dir-val">--</span>
        </div>
        <div class="info-item">
            <span class="label">風速</span>
            <span class="value" id="wind-spd-val">--m/s</span>
        </div>
    </div>

    <div class="footer" id="update-time">Update: syncing...</div>
</div>

<script>
    async function refresh() {
        try {
            const res = await fetch('data.json?' + Date.now());
            const data = await res.json();
            
            document.getElementById('wbgt-val').innerHTML = `${data.wbgt}<span class="wbgt-unit">℃</span>`;
            document.getElementById('temp-val').innerText = `${data.temp}℃`;
            document.getElementById('weather-val').innerText = data.weather;
            document.getElementById('wind-dir-val').innerText = data.wind_dir;
            document.getElementById('wind-spd-val').innerText = `${data.wind_speed}m/s`;
            document.getElementById('update-time').innerText = `Update: ${data.updated}`;

            const v = parseFloat(data.wbgt);
            const b = document.getElementById('status-body');
            const h = document.getElementById('header-text');
            if(v >= 31) { b.className='status-danger'; h.innerText='大石中：【危険】作業中止検討'; }
            else if(v >= 28) { b.className='status-warning'; h.innerText='大石中：【厳重警戒】'; }
            else { b.className='status-safe'; h.innerText='大石中：ほぼ安全'; }
        } catch(e) {}
    }
    setInterval(refresh, 60000);
    refresh();
</script>
</body>
</html>

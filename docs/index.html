<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WBGT Monitor - Oishi</title>
    <style>
        /* サイネージサイズ固定 */
        :root {
            --bg-color: #000000;
            --main-text: #ffffff;
            --sub-text: #aaaaaa;
            --accent-color: #00ff00; /* 安全時は緑 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 690px;
            height: 728px;
            background-color: var(--bg-color);
            color: var(--main-text);
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            border: 4px solid var(--accent-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 危険度別カラー */
        .danger { --accent-color: #ff0000; }     /* 危険：赤 */
        .warning { --accent-color: #ffaa00; }    /* 警戒：オレンジ */
        .safe { --accent-color: #00ccff; }       /* 安全：青 */

        .header {
            height: 60px;
            background: var(--accent-color);
            color: #000;
            font-weight: bold;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .wbgt-label { font-size: 40px; color: var(--sub-text); }
        .wbgt-value { 
            font-size: 220px; 
            font-weight: 900; 
            line-height: 0.9;
            color: var(--main-text);
        }
        .wbgt-unit { font-size: 80px; }

        .weather-info {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 20px;
            background: #111;
        }

        .info-box {
            border-left: 10px solid var(--accent-color);
            padding-left: 15px;
        }

        .info-label { font-size: 24px; color: var(--sub-text); display: block; }
        .info-data { font-size: 44px; font-weight: bold; }

        .footer {
            height: 50px;
            font-size: 20px;
            color: var(--sub-text);
            padding: 10px 20px;
            text-align: right;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body id="body-status" class="safe">

<div class="header" id="status-text">大石中付近：ほぼ安全</div>

<div class="main-content">
    <div class="wbgt-label">暑さ指数(WBGT)</div>
    <div class="wbgt-value" id="wbgt-val">24.5<span class="wbgt-unit">℃</span></div>
</div>

<div class="weather-info">
    <div class="info-box">
        <span class="info-label">気温</span>
        <span class="info-data" id="temp-val">28.0℃</span>
    </div>
    <div class="info-box">
        <span class="info-label">天気</span>
        <span class="info-data" id="weather-val">晴れ</span>
    </div>
    <div class="info-box">
        <span class="info-label">風向き</span>
        <span class="info-data" id="wind-dir-val">北西</span>
    </div>
    <div class="info-box">
        <span class="info-label">風速</span>
        <span class="info-data" id="wind-speed-val">2.5m/s</span>
    </div>
</div>

<div class="footer" id="update-time">Update: 2026/05/11 16:30</div>

<script>
    async function update() {
        try {
            const res = await fetch('data.json?' + Date.now());
            const data = await res.json();

            document.getElementById('wbgt-val').innerHTML = `${data.wbgt}<span class="wbgt-unit">℃</span>`;
            document.getElementById('temp-val').innerText = `${data.temp}℃`;
            document.getElementById('weather-val').innerText = data.weather;
            document.getElementById('wind-dir-val').innerText = data.wind_dir;
            document.getElementById('wind-speed-val').innerText = `${data.wind_speed}m/s`;
            document.getElementById('update-time').innerText = `Update: ${data.updated}`;

            const val = parseFloat(data.wbgt);
            const body = document.getElementById('body-status');
            const statusText = document.getElementById('status-text');

            if (val >= 31) {
                body.className = 'danger';
                statusText.innerText = '大石中付近：【危険】作業中止検討';
            } else if (val >= 28) {
                body.className = 'warning';
                statusText.innerText = '大石中付近：【厳重警戒】激しい運動中止';
            } else {
                body.className = 'safe';
                statusText.innerText = '大石中付近：ほぼ安全（注意点検）';
            }
        } catch (e) {
            console.log("Fetching data...");
        }
    }
    setInterval(update, 60000);
    update();
</script>
</body>
</html>

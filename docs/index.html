<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WBGT SIGNAGE</title>
    <style>
        /* 余計な文字が出ないよう、スタイルを完全にリセット */
        html, body {
            margin: 0;
            padding: 0;
            width: 690px;
            height: 728px;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            font-family: sans-serif;
        }

        :root { --accent: #00ccff; }
        .status-danger { --accent: #ff0000; }
        .status-warning { --accent: #ffaa00; }
        .status-safe { --accent: #00ccff; }

        .container {
            width: 690px;
            height: 728px;
            display: flex;
            flex-direction: column;
            border: 5px solid var(--accent);
            box-sizing: border-box;
        }

        .header {
            background-color: var(--accent);
            color: #000;
            font-size: 38px;
            font-weight: bold;
            padding: 15px;
            text-align: center;
        }

        .main-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .wbgt-label { font-size: 40px; color: #888; }
        .wbgt-value { font-size: 240px; font-weight: bold; line-height: 1; }
        .wbgt-unit { font-size: 80px; }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: #111;
            padding: 20px;
            gap: 20px;
        }

        .info-item {
            border-left: 10px solid var(--accent);
            padding-left: 15px;
        }

        .label { font-size: 24px; color: #888; display: block; }
        .value { font-size: 48px; font-weight: bold; }

        .footer {
            padding: 10px 20px;
            font-size: 22px;
            color: #555;
            text-align: right;
        }
    </style>
</head>
<body id="status-body" class="status-safe">

<div class="container">
    <div class="header" id="header-text">大石中：データ読込中</div>
    
    <div class="main-display">
        <div class="wbgt-label">暑さ指数 (WBGT)</div>
        <div class="wbgt-value" id="wbgt-val">--<span class="wbgt-unit">℃</span></div>
    </div>

    <div class="info-grid">
        <div class="info-item">
            <span class="label">気温</span>
            <span class="value" id="temp-val">--.-℃</span>
        </div>
        <div class="info-item">
            <span class="label">天気</span>
            <span class="value" id="weather-val">--</span>
        </div>
        <div class="info-item">
            <span class="label">風向</span>
            <span class="value" id="wind-dir-val">--</span>
        </div>
        <div class="info-item">
            <span class="label">風速</span>
            <span class="value" id="wind-spd-val">--m/s</span>
        </div>
    </div>

    <div class="footer" id="update-time">SYNCING...</div>
</div>

<script>
    async function update() {
        try {
            const r = await fetch('data.json?t=' + Date.now());
            const d = await r.json();
            
            document.getElementById('wbgt-val').innerHTML = d.wbgt + '<span class="wbgt-unit">℃</span>';
            document.getElementById('temp-val').innerText = d.temp + '℃';
            document.getElementById('weather-val').innerText = d.weather;
            document.getElementById('wind-dir-val').innerText = d.wind_dir;
            document.getElementById('wind-spd-val').innerText = d.wind_speed + 'm/s';
            document.getElementById('update-time').innerText = '最終更新: ' + d.updated;

            const v = parseFloat(d.wbgt);
            const b = document.getElementById('status-body');
            const h = document.getElementById('header-text');
            if(v >= 31) { b.className='status-danger'; h.innerText='大石中：【危険】作業中止検討'; }
            else if(v >= 28) { b.className='status-warning'; h.innerText='大石中：【厳重警戒】'; }
            else { b.className='status-safe'; h.innerText='大石中：ほぼ安全'; }
        } catch(e) {}
    }
    setInterval(update, 30000);
    update();
</script>

</body>
</html>
